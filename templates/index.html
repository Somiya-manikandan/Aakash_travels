<!DOCTYPE html>
<html>
<head>
    <title>Aakash Travels</title>
</head>
<body>

<h1>🌍 Aakash Travels</h1>

<a href="{{ url_for('login') }}">Login</a> |
<a href="{{ url_for('register') }}">Register</a> |
<a href="{{ url_for('logout') }}">Logout</a>

<h2>Packages</h2>

{% for p in packages %}
    <p><b>{{ p.place }}</b> - ₹{{ p.price }}</p>
    <a href="{{ url_for('book', id=p.id) }}">Book Now</a>
    <hr>
{% endfor %}

</body>
</html>
