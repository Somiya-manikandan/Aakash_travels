<!DOCTYPE html>
<html>
<head>
    <title>Edit Package</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h2>Edit Package</h2>

<form method="post" action="{{ url_for('update_package', id=package.id) }}">
    Place: <input type="text" name="place" value="{{ package.place }}">
    Price: <input type="text" name="price" value="{{ package.price }}">
    <button type="submit">Update</button>
</form>

</div>

</body>
</html>
