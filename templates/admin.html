<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h2>Admin Panel</h2>

<!-- ADD PACKAGE -->
<h4>Add Package</h4>
<form method="post" action="/add_package">
    <input name="place" placeholder="Place" class="form-control mb-2">
    <input name="price" placeholder="Price" class="form-control mb-2">
    <button class="btn btn-success">Add</button>
</form>

<hr>

<!-- PACKAGES TABLE -->
<h4>Packages</h4>

<table class="table table-bordered">
<tr>
    <th>Place</th>
    <th>Price</th>
    <th>Actions</th>
</tr>

{% for p in packages %}
<tr>
    <td>{{p.place}}</td>
    <td>₹{{p.price}}</td>
    <td>
        <a href="/edit_package/{{p.id}}" class="btn btn-warning btn-sm">Edit</a>
        <a href="/delete_package/{{p.id}}" class="btn btn-danger btn-sm">Delete</a>
    </td>
</tr>
{% endfor %}
</table>

<hr>

<!-- BOOKINGS TABLE -->
<h4>Bookings</h4>

<table class="table table-striped">
<tr>
    <th>User Name</th>
    <th>Package</th>
</tr>

{% for b in bookings %}
<tr>
    <td>{{b.name}}</td>
    <td>{{b.place}}</td>
</tr>
{% endfor %}
</table>

</div>

</body>
</html>
