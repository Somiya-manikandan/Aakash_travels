<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<style>
body { font-family:Arial; background:#f4f6f8; }

h2 {
    background:#343a40;
    color:white;
    padding:10px;
    text-align:center;
}

.container {
    width:80%;
    margin:auto;
}

button {
    background:#007bff;
    color:white;
    border:none;
    padding:8px;
    border-radius:5px;
}

a {
    text-decoration:none;
    margin:5px;
}
</style>
</head>
<body>

<h2>Admin Dashboard</h2>

<div class="container">

<a href="{{ url_for('logout') }}">Logout</a>

<h3>Add Package</h3>
<form method="post" action="{{ url_for('add_package') }}">
    <input type="text" name="place" placeholder="Place" required>
    <input type="text" name="price" placeholder="Price" required>
    <button>Add</button>
</form>

<h3>Packages</h3>
{% for p in packages %}
    {{ p.place }} - ₹{{ p.price }}
    <a href="{{ url_for('edit_package', id=p.id) }}">✏️</a>
    <a href="{{ url_for('delete_package', id=p.id) }}">🗑️</a>
    <br><br>
{% endfor %}

<h3>Bookings</h3>
{% for b in bookings %}
    👤 {{ b.name }} → {{ b.place }}<br>
{% endfor %}

</div>

</body>
</html>
