<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body>

<h2>👨‍💼 Admin Dashboard</h2>

<a href="{{ url_for('home') }}">Home</a> |
<a href="{{ url_for('logout') }}">Logout</a>

<hr>

<h3>Add Package</h3>
<form method="post" action="{{ url_for('add_package') }}">
    Place: <input type="text" name="place" required>
    Price: <input type="text" name="price" required>
    <button type="submit">Add</button>
</form>

<hr>

<h3>All Packages</h3>
{% for p in packages %}
    <b>{{ p.place }}</b> - ₹{{ p.price }}
    <a href="{{ url_for('edit_package', id=p.id) }}">✏️ Edit</a>
    <a href="{{ url_for('delete_package', id=p.id) }}">🗑️ Delete</a>
    <br><br>
{% endfor %}

<hr>

<h3>Bookings</h3>
{% for b in bookings %}
    👤 {{ b.name }} booked 🌍 {{ b.place }} <br>
{% endfor %}

</body>
</html>
